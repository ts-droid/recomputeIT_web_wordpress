name: Deploy WordPress Theme

on:
  push:
    branches:
      - main
    paths:
      - "Public HTML/wp-content/themes/recompute-repair/**"
      - ".github/workflows/deploy-theme.yml"
  workflow_dispatch:

jobs:
  deploy-theme:
    timeout-minutes: 8
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure SSH
        shell: bash
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.HOSTINGER_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${{ secrets.HOSTINGER_PORT }}" "${{ secrets.HOSTINGER_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy theme via rsync
        shell: bash
        run: |
          HOSTINGER_HOST="$(printf '%s' '${{ secrets.HOSTINGER_HOST }}' | tr -d '\r' | xargs)"
          HOSTINGER_PORT="$(printf '%s' '${{ secrets.HOSTINGER_PORT }}' | tr -d '\r' | xargs)"
          HOSTINGER_USER="$(printf '%s' '${{ secrets.HOSTINGER_USER }}' | tr -d '\r' | xargs)"
          HOSTINGER_THEME_PATH="$(printf '%s' '${{ secrets.HOSTINGER_THEME_PATH }}' | tr -d '\r' | sed 's/[[:space:]]*$//')"

          if [ -z "$HOSTINGER_THEME_PATH" ]; then
            echo "Missing secret: HOSTINGER_THEME_PATH"
            exit 1
          fi
          if [ -z "$HOSTINGER_HOST" ] || [ -z "$HOSTINGER_PORT" ] || [ -z "$HOSTINGER_USER" ]; then
            echo "Missing one of HOSTINGER_HOST / HOSTINGER_PORT / HOSTINGER_USER"
            exit 1
          fi

          ssh -p "$HOSTINGER_PORT" \
            -i ~/.ssh/id_ed25519 \
            -o IdentitiesOnly=yes \
            -o BatchMode=yes \
            -o ConnectTimeout=15 \
            "$HOSTINGER_USER@$HOSTINGER_HOST" \
            "mkdir -p '$HOSTINGER_THEME_PATH'"

          RSYNC_SSH="ssh -p $HOSTINGER_PORT -i ~/.ssh/id_ed25519 -o IdentitiesOnly=yes -o BatchMode=yes -o ConnectTimeout=15 -o ServerAliveInterval=15 -o ServerAliveCountMax=3"
          rsync -az --delete --timeout=60 -e "$RSYNC_SSH" "Public HTML/wp-content/themes/recompute-repair/" "$HOSTINGER_USER@$HOSTINGER_HOST:$HOSTINGER_THEME_PATH/"
